spring:
  application:
    name: bankcore

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:bankcore}
    username: ${DB_USERNAME:bankcore}
    password: ${DB_PASSWORD:bankcore}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
