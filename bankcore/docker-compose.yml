services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: bankcore
      DB_USERNAME: bankcore
      DB_PASSWORD: bankcore
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bankcore
      POSTGRES_USER: bankcore
      POSTGRES_PASSWORD: bankcore
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankcore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
